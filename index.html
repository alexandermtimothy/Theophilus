<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ministry Study Tool</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="sidebar">

<h1>📖</h1>

<h2>Study Tool</h2>

<button>Dashboard</button>
<button>Scripture</button>
<button>Notes</button>
<button>AI Study</button>
<button>Assignments</button>
<button>Resources</button>

</div>

<div class="content">

<header>
<h1 id="pageTitle">Study Dashboard</h1>

<input id="searchBox" placeholder="Search Scripture (e.g. Romans 8)">
</header>

<div id="view" class="cards">

<div class="card">
<h2>Welcome</h2>
<p>Search a passage to begin studying.</p>
</div>

<div class="card">
<h2>Recent</h2>
<p>Nothing opened yet.</p>
</div>

<div class="card">
<h2>Notes</h2>
<p>Saved notes will appear per passage.</p>
</div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
