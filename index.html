<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ministry Study Tool</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="sidebar">

<h1>📖</h1>

<h2>Study Tool</h2>

<button>Dashboard</button>
<button>Scripture</button>
<button>Notes</button>
<button>AI Study</button>
<button>Assignments</button>
<button>Resources</button>

</div>

<div class="content">

<header>
<h1 id="pageTitle">Study Dashboard</h1>

<input id="searchBox" placeholder="Search Scripture (e.g. Romans 8)">
</header>

<div id="view" class="cards">

  <div class="card">
    <h2>Passage</h2>
    <div id="passageText">
      <p>Search a passage to begin.</p>
    </div>
  </div>

  <div class="card">
    <h2>AI Study</h2>

    <button id="aiButton" style="
      padding:12px;
      width:100%;
      border:none;
      border-radius:8px;
      cursor:pointer;
      background:#334155;
      color:white;
    ">
      Explain This Passage
    </button>

    <div id="aiOutput" style="
      margin-top:15px;
      line-height:1.5;
      opacity:0.9;
      white-space:pre-wrap;
    "></div>

  </div>

  <div class="card">
    <h2>My Notes</h2>
    <textarea id="notesBox" style="
      width:100%;
      height:180px;
      margin-top:10px;
      padding:10px;
      border-radius:8px;
      border:none;
      resize:vertical;
    "></textarea>

    <p style="opacity:0.6; margin-top:10px;">
      Autosaves as you type
    </p>

  </div>

</div>

<script src="script.js"></script>

</body>
</html>
